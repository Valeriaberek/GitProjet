services:
  db:
    image: postgres:18
    container_name: rl-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: rowing_logbook
      POSTGRES_USER: rl_user
      POSTGRES_PASSWORD: rl_pass
      TZ: Europe/Paris
      PGTZ: Europe/Paris
    ports:
      - "${DEV_DB_PORT:-5432}:5432"
    volumes:
      - rl_db_dev_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rl_dev_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: rl-mailpit-dev
    restart: unless-stopped
    ports:
      - "${DEV_MAILPIT_SMTP_PORT:-1025}:1025"
      - "${DEV_MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - rl_dev_net

volumes:
  rl_db_dev_data:

networks:
  rl_dev_net:
    name: rl_dev_net
